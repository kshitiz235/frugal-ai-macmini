<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSeek Chat Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>DeepSeek Chat Assistant</h1>
        <p>Powered by your local DeepSeek model through Dify.</p>
      </header>
      <section class="chat" id="chat"></section>
      <form id="chat-form">
        <textarea id="message" rows="3" placeholder="Ask anything about your organization..."></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    <template id="bubble-template">
      <article class="bubble">
        <div class="bubble__meta"></div>
        <div class="bubble__body"></div>
      </article>
    </template>
    <script src="/main.js" type="module"></script>
  </body>
</html>
